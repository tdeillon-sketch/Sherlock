<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sherlock Parent — Compagnon du livre</title>
<style>
  :root {
    --bg: #0d1f2d;
    --surface: #132f42;
    --accent: #c0713a;
    --text: #f0f0f0;
    --text-soft: #c8d8e8;
    --text-muted: #8899aa;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg); color: var(--text-soft); min-height: 100vh;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 48px 24px; line-height: 1.5; text-align: center;
  }
  .eyebrow {
    font-size: 11px; font-weight: 700; letter-spacing: 2px;
    text-transform: uppercase; color: var(--accent); margin-bottom: 12px;
  }
  h1 {
    font-family: "Playfair Display", Georgia, serif;
    font-size: 38px; color: var(--text); margin-bottom: 12px; max-width: 600px; line-height: 1.25;
  }
  .tagline {
    font-size: 15px; color: var(--text-muted); font-style: italic;
    margin-bottom: 48px; max-width: 500px;
  }
  .links { display: flex; flex-direction: column; gap: 12px; margin-top: 24px; }
  a.btn {
    display: inline-block; background: var(--surface); color: var(--text);
    padding: 14px 28px; border-radius: 24px; text-decoration: none;
    font-size: 14px; font-weight: 600;
    border: 1px solid rgba(255, 255, 255, 0.1);
    transition: all 0.2s;
  }
  a.btn:hover { border-color: var(--accent); color: var(--accent); }
  .footer {
    margin-top: 72px; color: var(--text-muted); font-size: 12px;
  }
  .footer a { color: var(--accent); text-decoration: none; }
</style>
</head>
<body>

<div class="eyebrow">Le compagnon de lecture</div>
<h1>On a tous besoin<br/>de quelqu'un d'autre</h1>
<p class="tagline">
  Thomas Deillon — le voyage intérieur d'un père imparfait<br/>
  pour mieux comprendre ses enfants.
</p>

<div class="links">
  <a href="privacy.html" class="btn">Politique de confidentialité</a>
</div>

<div class="footer">
  Application disponible prochainement sur l'App Store.<br/>
  Contact : <a href="mailto:contact@thomasdeillon.com">contact@thomasdeillon.com</a>
</div>

</body>
</html>
